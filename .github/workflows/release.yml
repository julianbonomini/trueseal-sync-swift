name: Release XCFramework

# Triggered by a version tag, e.g.: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14   # Apple Silicon, Xcode 15+

    steps:
      # ── Checkouts ───────────────────────────────────────────────────────────
      # Repos must be siblings so the Cargo path deps (../hush-noise/rust)
      # and the build script (../hush-sync) resolve correctly.

      - name: Checkout hush-sync-swift
        uses: actions/checkout@v4
        with:
          path: hush-sync-swift

      - name: Checkout hush-sync
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/hush-sync
          path: hush-sync

      - name: Checkout hush-noise
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/hush-noise
          path: hush-noise

      # ── Rust toolchain ───────────────────────────────────────────────────────

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-apple-darwin,x86_64-apple-darwin,
            aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: hush-sync -> target

      # ── Build ────────────────────────────────────────────────────────────────

      # hush-sync Cargo.toml only declares cdylib + lib (rlib); XCFramework
      # needs a static archive (.a). Patch before building — ephemeral in CI.
      - name: Add staticlib to hush-sync crate-type
        run: |
          sed -i '' \
            's/crate-type = \["cdylib", "lib"\]/crate-type = ["cdylib", "staticlib", "lib"]/' \
            hush-sync/Cargo.toml
          grep crate-type hush-sync/Cargo.toml

      - name: Build XCFramework
        working-directory: hush-sync-swift
        run: bash scripts/build-xcframework.sh

      # ── Package ──────────────────────────────────────────────────────────────

      - name: Zip XCFramework
        working-directory: hush-sync-swift
        run: zip -r HushSyncFFI.xcframework.zip HushSyncFFI.xcframework

      - name: Compute checksum
        id: checksum
        working-directory: hush-sync-swift
        run: |
          echo "value=$(swift package compute-checksum HushSyncFFI.xcframework.zip)" \
            >> "$GITHUB_OUTPUT"

      # ── Stamp Package.swift in-memory only ───────────────────────────────────
      # Swap path: → url:+checksum: so the GitHub Release artifact has the
      # correct Package.swift for remote consumers.
      # This is NOT committed back — source stays as path: for local dev.

      - name: Stamp Package.swift with release URL and checksum
        working-directory: hush-sync-swift
        env:
          TAG:      ${{ github.ref_name }}
          CHECKSUM: ${{ steps.checksum.outputs.value }}
          REPO:     ${{ github.repository }}
        run: |
          URL="https://github.com/${REPO}/releases/download/${TAG}/HushSyncFFI.xcframework.zip"
          sed -i '' \
            -e "s|path: \"HushSyncFFI.xcframework\"|url: \"${URL}\", checksum: \"${CHECKSUM}\"|" \
            Package.swift
          echo "Stamped: $URL  ($CHECKSUM)"
          grep -A2 "binaryTarget" Package.swift | grep -E "url|path"

      # ── Commit Package.swift + bindings, retag ─────────────────────────────
      # Package.swift is stamped with url:+checksum: above.
      # We commit it (+ the generated bindings) and force-move the release tag
      # to that commit so that SPM remote consumers resolve correctly.
      # Source tree never contains a stale path: reference after a release.

      - name: Commit stamped Package.swift and bindings to main
        working-directory: hush-sync-swift
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift Sources/HushSyncBindings/
          git diff --cached --quiet \
            || git commit -m "chore: stamp Package.swift and update bindings for ${TAG} [skip ci]"
          git push origin HEAD:main

      - name: Move tag to stamped commit
        working-directory: hush-sync-swift
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git tag -f "$TAG"
          git push origin "$TAG" --force

      # ── GitHub Release ───────────────────────────────────────────────────────
      # The zip contains the stamped Package.swift (url:+checksum:) so remote
      # consumers resolve correctly. Source repo keeps path: for local dev.

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: hush-sync-swift/HushSyncFFI.xcframework.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
