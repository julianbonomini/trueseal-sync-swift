name: Release

# Triggered by a version tag, e.g.: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v[0-9]*'

env:
  TRUESEAL_SYNC_TAG: v0.4.0

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Download prebuilt xcframework + UniFFI bindings from trueseal-sync release.
      # Pin the version via the TRUESEAL_SYNC_TAG repo variable (Settings → Variables).
      - name: Download trueseal-sync release artifacts
        env:
          GH_TOKEN: ${{ secrets.TRUESEAL_READ_TOKEN }}
        run: |
          gh release download ${{ env.TRUESEAL_SYNC_TAG }} \
            --repo ${{ github.repository_owner }}/trueseal-sync \
            --pattern "trueseal-sync-swift-${{ env.TRUESEAL_SYNC_TAG }}.zip" \
            --output trueseal-sync-swift.zip

      - name: Extract xcframework and bindings
        run: |
          unzip -q trueseal-sync-swift.zip
          rm -rf TruesealSyncFFI.xcframework
          cp -R trueseal-swift-staging/TruesealSyncFFI.xcframework .
          rm -f Sources/TruesealSyncBindings/*.swift
          cp trueseal-swift-staging/trueseal_sync.swift \
             Sources/TruesealSyncBindings/trueseal_sync.swift

      - name: Swift build
        run: swift build

      - name: Swift test
        run: swift test

      # ── Package ──────────────────────────────────────────────────────────────

      - name: Zip XCFramework
        run: zip -r TruesealSyncFFI.xcframework.zip TruesealSyncFFI.xcframework

      - name: Compute checksum
        id: checksum
        run: |
          echo "value=$(swift package compute-checksum TruesealSyncFFI.xcframework.zip)" \
            >> "$GITHUB_OUTPUT"

      # ── Stamp Package.swift ──────────────────────────────────────────────────
      # Swap path: → url:+checksum: so SPM consumers resolve the remote artifact.
      # This IS committed back so the published tag always has the correct reference.
      # Source repo keeps path: for local dev — release workflow stamps on each tag.

      - name: Stamp Package.swift with release URL and checksum
        env:
          TAG:      ${{ github.ref_name }}
          CHECKSUM: ${{ steps.checksum.outputs.value }}
          REPO:     ${{ github.repository }}
        run: |
          URL="https://github.com/${REPO}/releases/download/${TAG}/TruesealSyncFFI.xcframework.zip"
          sed -i '' \
            -e "s|path: \"TruesealSyncFFI.xcframework\"|url: \"${URL}\", checksum: \"${CHECKSUM}\"|" \
            Package.swift
          echo "Stamped: $URL ($CHECKSUM)"

      # ── Commit stamped Package.swift + bindings, retag ───────────────────────

      - name: Commit stamped Package.swift and bindings to main
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift Sources/TruesealSyncBindings/
          git diff --cached --quiet \
            || git commit -m "chore: stamp Package.swift and update bindings for ${TAG} [skip ci]"
          git push origin HEAD:main

      - name: Move tag to stamped commit
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git tag -f "$TAG"
          git push origin "$TAG" --force

      # ── GitHub Release ────────────────────────────────────────────────────────

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: TruesealSyncFFI.xcframework.zip
          body: |
            **trueseal-sync**: ${{ env.TRUESEAL_SYNC_TAG }}
            **checksum**: ${{ steps.checksum.outputs.value }}
          generate_release_notes: true
          fail_on_unmatched_files: true
